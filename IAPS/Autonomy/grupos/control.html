<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Controle</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="control.css">
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="login-box">
    <h2 id="login-status">ID da Tela</h2>
    <input type="tel" id="target-id" maxlength="4" placeholder="0000" autocomplete="off">
    <p class="login-hint">Conexão automática ao digitar 4 dígitos</p>
    <div class="login-divider">
      <a href="tela.html?id=0000" target="_blank">↗ Abrir Tela de Projeção</a>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div id="connection-manager">
  <div class="topbar-left">
    <div id="status-dot"></div>
    <span class="topbar-id">SALA <strong id="display-id">----</strong></span>
    <span id="screens-count">0 participantes</span>
  </div>
  <div class="topbar-right">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnModeDupla" onclick="_ctrl.setMode('dupla')">DUPLA</button>
      <button class="mode-btn" id="btnModeGrupo" onclick="_ctrl.setMode('grupo')">GRUPO</button>
    </div>
    <button id="langToggleBtn" class="topbar-btn btn-pt" onclick="_ctrl.toggleLang()">PT</button>
  </div>
</div>

<div class="main-grid">
  <h1 data-i18n="title">Painel de Controle</h1>

  <div class="participants-row" id="participantsRow"></div>

  <div class="bottom-area">
    <div class="rand-card">
      <span class="rand-card-title" data-i18n="randMode">🔀 Modo Aleatório</span>
      <div class="rand-controls">
        <button class="ctrl-btn" id="btnBack" onclick="_ctrl.prevRandom()" data-i18n="btnBack">⬅ Voltar</button>
        <button class="ctrl-btn" id="btnNext" onclick="_ctrl.nextRandom()" data-i18n="btnNext">Avançar ➡</button>
        <div class="interval-wrap">
          <span data-i18n="minTime">seg</span>
          <input id="minInterval" type="number" value="5" min="1" max="999">
        </div>
      </div>
      <div class="rand-row2">
        <button id="toggleRandomBtn" onclick="_ctrl.toggleRandom()" data-i18n="btnStart">Iniciar</button>
        <button id="audioToggleBtn" onclick="_ctrl.toggleAudio()">🔇 Áudio: OFF</button>
      </div>
    </div>

    <div class="side-links">
      <a href="tela.html" target="_blank" class="open-screen-btn">
        ↗ <span data-i18n="openTab">Tela de Projeção</span>
      </a>
      <div class="open-monitor-btn" onclick="_ctrl.openMonitor()">
        ⬛ <span>Monitor Interno</span>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import * as ctrl from './js/control.js';
  window._ctrl = ctrl;
  ctrl.init();
</script>
</body>
</html>
