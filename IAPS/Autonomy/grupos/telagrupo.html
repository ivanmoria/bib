    #solo-container {

    .solo-num { font-family: 'Syne Mono', monospace; font-size: clamp(11px,1.2vw,15px); letter-spacing: 0.35em; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: clamp(12px,2.5vh,28px); }

.iaps-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: var(--accent, #2a6b4a); /* Cor de fallback caso a variável falhe */
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.88rem;
    box-shadow: 0 4px 12px rgba(42,107,74,0.25);
    transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
    
    /* ADICIONE ESTAS DUAS LINHAS: */
    position: relative; 
    z-index: 999;
}

.iaps-btn svg {
    flex-shrink: 0;
    stroke: #fff;
    transition: transform 0.3s ease;
}

.iaps-btn:hover {
    background: var(--accent-warm);
    box-shadow: 0 6px 18px rgba(196,98,45,0.35);
    transform: translateY(-2px);
}

.iaps-btn:hover svg {
    transform: rotate(15deg) scale(1.1);
}

.iaps-btn span {
    display: block;
    line-height: 1.3;
}

/* Alternar idioma se quiser esconder um dos spans */
.btn-iaps-label-en { display: none; } /* mostrar apenas pt por padrão */
