<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Interno</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;1,300&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="monitor.css">
</head>
<body>

<header>
  <div class="header-left">
    <div id="live-dot"></div>
    <span class="header-title">Monitor Interno</span>
    <span class="monitor-badge">INTERNO</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="view-toggle-btn" class="proj-toggle-btn" onclick="_monitor.toggleView()">▣ Projeção</button>
    <span id="conn-badge">—</span>
    <span id="last-update">sem sinal</span>
  </div>
</header>

<div id="no-signal">
  <div class="no-signal-icon">⬛</div>
  <div class="no-signal-text">Aguardando Painel de Controle...</div>
</div>

<main id="main-area" style="display:none;">
  <div class="mode-label" id="mode-label">MODO: —</div>
  <div id="cards-grid" class="grid-dupla"></div>
</main>

<!-- Projection view (full-screen, toggled via button) -->
<div id="projection-view"></div>

<script type="module">
  import * as monitor from './js/monitor.js';
  window._monitor = monitor;
  monitor.init();
</script>
</body>
</html>
